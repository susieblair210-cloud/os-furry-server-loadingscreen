<!DOCTYPE html>
<html>
<head>
    <style>
        /* ---------- Base Styles ---------- */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', monospace;
            color: #6a6;
            background: transparent;
            overflow: hidden;
        }
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            z-index: 1;
        }

        /* ---------- Bottom-Center Panel (20% smaller, 60% transparent) ---------- */
        .content-panel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            background: rgba(10, 10, 10, 0.40);
            /* 60% transparent = 40% opacity */
            border-radius: 16px;
            padding: 16px 24px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(106, 170, 106, 0.40);
            /* 60% transparent border */
            max-width: 640px;
            /* 20% smaller: 800px → 640px */
            margin: 0 auto;
            z-index: 2;
            transition: opacity 0.5s;
        }
        @media (min-width: 800px) {
            .content-panel {
                left: 50%;
                transform: translateX(-50%);
                right: auto;
                width: 640px;
                /* 20% smaller: 800px → 640px */
            }
        }

        .loading-text {
            font-size: 16px;
            /* 20% smaller: 20px → 16px */
            color: #8a8;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .current-phrase {
            font-size: 26px;
            /* ~20% smaller: 32px → 26px */
            font-weight: bold;
            color: #ffaa00;
            text-shadow: 0 0 10px #ffaa00;
            min-height: 56px;
            /* 20% smaller: 70px → 56px */
            margin-bottom: 12px;
        }

        /* ---------- Story Panel (40% transparent) ---------- */
        .story-panel {
            background: rgba(17, 17, 17, 0.60);
            /* 40% transparent = 60% opacity */
            border: 2px solid rgba(106, 170, 106, 0.60);
            /* 40% transparent border */
            border-radius: 8px;
            padding: 12px;
            /* 20% smaller: 15px → 12px */
            height: 160px;
            /* 20% smaller: 200px → 160px */
            overflow-y: auto;
            text-align: left;
            font-size: 12px;
            /* 20% smaller: 15px → 12px */
            color: #ccc;
            line-height: 1.5;
            scroll-behavior: smooth;
            margin-bottom: 12px;
        }
        .story-panel div {
            margin-bottom: 5px;
            border-left: 3px solid rgba(106, 170, 106, 0.60);
            padding-left: 10px;
        }

        .board-container {
            display: flex;
            justify-content: center;
        }

        /* ---------- Tic-Tac-Toe Canvas (40% transparent) ---------- */
        canvas {
            background: rgba(26, 26, 26, 0.60);
            /* 40% transparent = 60% opacity */
            border: 2px solid rgba(106, 170, 106, 0.60);
            /* 40% transparent border */
            border-radius: 8px;
            width: 200px;
            /* 20% smaller: 250px → 200px */
            height: 200px;
            /* 20% smaller: 250px → 200px */
        }
        audio {
            display: none;
        }

        /* ---------- Ticker (50% transparent) ---------- */
        .ticker-container {
            position: fixed;
            top: 55px;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.50);
            /* 50% transparent = 50% opacity */
            backdrop-filter: blur(3px);
            border-top: 2px solid rgba(106, 170, 106, 0.50);
            border-bottom: 2px solid rgba(106, 170, 106, 0.50);
            color: #6a6;
            font-size: 22px;
            padding: 12px 0;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .ticker-message {
            display: inline-block;
            padding: 0 20px;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---------- Greeting Overlay ---------- */
        .greeting-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 20, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s;
            pointer-events: none;
            color: #fff;
            font-size: 48px;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px #6a6;
        }
        .greeting-overlay.fade-out {
            opacity: 0;
        }

        /* ---------- Info Mode Overlay ---------- */
        .info-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
            color: #fff;
            font-size: 28px;
            text-align: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
            box-sizing: border-box;
        }
        .info-overlay.active {
            display: flex;
        }
        .info-content {
            max-width: 800px;
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #6a6;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 0 30px #6a6;
            line-height: 1.6;
            font-size: 24px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="bg"></div>

    <audio id="bgm" loop autoplay>
        <source src="https://raw.githubusercontent.com/susieblair210-cloud/os-furry-server-loadingscreen/main/in-waiting-for-miracle-438841%20(1)%20(mp3cut.net).mp3" type="audio/mpeg">
    </audio>

    <!-- Greeting Overlay -->
    <div class="greeting-overlay" id="greetingOverlay"></div>

    <!-- Info Overlay -->
    <div class="info-overlay" id="infoOverlay">
        <div class="info-content" id="infoContent"></div>
    </div>

    <!-- Ticker (50% transparent banner on top) -->
    <div class="ticker-container" id="tickerContainer">
        <div class="ticker-message" id="tickerMessage">✦ Os's Furry Server ✦</div>
    </div>

    <!-- Main content panel (20% smaller, 60% transparent) -->
    <div class="content-panel" id="mainPanel">
        <div class="loading-text">Os's Furry Server is loading...</div>
        <div class="current-phrase" id="phrase">initializing...</div>
        <div class="story-panel" id="story"></div>
        <div class="board-container">
            <canvas id="tictactoe" width="200" height="200"></canvas>
        </div>
    </div>

    <script>
        // ---------- Time‑Based Greeting ----------
        const greetingEl = document.getElementById('greetingOverlay');
        const hour = new Date().getHours();
        let greetingText = '';
        if (hour >= 4 && hour < 11) greetingText = 'good morning floof!';
        else if (hour >= 11 && hour < 14) greetingText = 'Having a nice lunch while you wait?';
        else if (hour >= 14 && hour < 22) greetingText = 'good afternoon floof!';
        else greetingText = 'Instead of sleeping, you\'re playing on here? Welcome floof!';
        greetingEl.innerText = greetingText;

        // Fade out after 4 seconds
        setTimeout(() => {
            greetingEl.classList.add('fade-out');
            setTimeout(() => {
                greetingEl.style.display = 'none';
            }, 1000);
        }, 4000);

        // ---------- STAGGERED SEQUENTIAL IMAGE LOADER (one at a time, spaced out) ----------
        const baseURL = "https://raw.githubusercontent.com/susieblair210-cloud/os-furry-server-loadingscreen/main/";
        const filenames = [
            "Untitled23_20260130231227%20-%20Copy.jpg",
            "Untitled24_20260130232531.jpg",
            "Untitled25_20260301023849.jpg",
            "Untitled27_20260302212710.jpg",
            "Untitled28_20260307003558.jpg",
            "Untitled29_20260307003814.jpg",
            "Untitled84_20260318194944.png",
            "Untitled85_20260320130433.png",
            "Untitled86_20260320131018.png",
            "Untitled87_20260320131054.png",
            "Untitled88_20260320131347.png",
            "Untitled89_20260320213506.png",
            "Untitled30_20260406164617.jpg",
            "Untitled31_20260418150754.jpg",
            "Untitled32_20260418151500.jpg",
            "Untitled91_20260420200624.png",
            "Untitled92_20260421155356.png",
            "Untitled94_20260421155500.png",
            "Untitled95_20260423172008.png",
            "Untitled96_20260512175431.png",
            "Untitled97_20260512175720.png",
            "Untitled98_20260512175909.png",
            "Untitled99_20260512175937.png",
            "Screenshot 2026-05-22 173331.png"
        ];
        const imageUrls = filenames.map(f => baseURL + f);
        // Image state tracking
        let imageItems = imageUrls.map((url, idx) => ({
            url: url,
            loaded: false,
            failed: false,
            retries: 0,
            index: idx
        }));

        let loadedImages = []; // URLs of successfully loaded images
        let currentBgIndex = -1;
        const bgDiv = document.getElementById('bg');
        let bgRotationInterval = null;

        // Configuration
        const LOAD_INTERVAL_MS = 5000; // load one new image every 5 seconds
        const MAX_RETRIES = 3;
        const RETRY_DELAY_MS = 20000; // if an image fails, retry it after 20 seconds

        let loadTimer = null;
        let retryTimer = null;
        let isLoading = false; // prevent overlapping loads

        // Load a single image by index; returns a promise that resolves if loaded, rejects if permanently failed
        function loadSingleImage(index) {
            return new Promise((resolve, reject) => {
                const item = imageItems[index];
                if (item.loaded) {
                    resolve(item.url);
                    return;
                }
                if (item.failed && item.retries >= MAX_RETRIES) {
                    reject(new Error(`Image ${index} permanently failed`));
                    return;
                }

                const img = new Image();
                img.onload = () => {
                    if (!item.loaded) {
                        item.loaded = true;
                        item.failed = false;
                        if (!loadedImages.includes(item.url)) {
                            loadedImages.push(item.url);
                        }
                        console.log(
                            `✅ Loaded image ${index} (${loadedImages.length}/${imageUrls.length})`
                            );
                    }
                    resolve(item.url);
                };
                img.onerror = () => {
                    item.retries++;
                    console.warn(`⚠️ Image ${index} failed (attempt ${item.retries}/${MAX_RETRIES})`);
                    if (item.retries >= MAX_RETRIES) {
                        item.failed = true;
                        reject(new Error(`Image ${index} failed permanently`));
                    } else {
                        // Not permanently failed, can be retried later
                        reject(new Error(`Image ${index} failed, will retry`));
                    }
                };
                img.src = item.url;
            });
        }

        // Get a random unloaded (and not permanently failed) image index
        function getRandomUnloadedIndex() {
            const unloadedIndices = [];
            for (let i = 0; i < imageItems.length; i++) {
                const item = imageItems[i];
                if (!item.loaded && !(item.failed && item.retries >= MAX_RETRIES)) {
                    unloadedIndices.push(i);
                }
            }
            if (unloadedIndices.length === 0) return -1;
            const randomPos = Math.floor(Math.random() * unloadedIndices.length);
            return unloadedIndices[randomPos];
        }

        // Attempt to load the next random image
        async function loadNextImage() {
            if (isLoading) return;
            const nextIdx = getRandomUnloadedIndex();
            if (nextIdx === -1) {
                console.log("🎉 All images processed.");
                if (loadTimer) clearInterval(loadTimer);
                loadTimer = null;
                return;
            }

            isLoading = true;
            try {
                await loadSingleImage(nextIdx);
            } catch (err) {
                console.log(`Image ${nextIdx} failed, will retry later.`);
            } finally {
                isLoading = false;
            }
        }

        // Start the staggered loading process (random order)
        function startStaggeredLoading() {
            // First, load a random initial image immediately (no delay)
            const randomIndex = Math.floor(Math.random() * imageUrls.length);
            loadSingleImage(randomIndex)
                .then(() => {
                    if (loadedImages.length > 0) {
                        currentBgIndex = loadedImages.length - 1;
                        bgDiv.style.backgroundImage = `url('${loadedImages[currentBgIndex]}')`;
                    }
                    // Start interval to load next random images
                    if (loadTimer) clearInterval(loadTimer);
                    loadTimer = setInterval(() => {
                        loadNextImage();
                    }, LOAD_INTERVAL_MS);
                })
                .catch(() => {
                    // Fallback if initial fails, try another random one
                    console.warn("Initial image failed, trying another...");
                    for (let i = 0; i < imageUrls.length; i++) {
                        if (i !== randomIndex) {
                            loadSingleImage(i)
                                .then(() => {
                                    if (loadedImages.length > 0) {
                                        currentBgIndex = loadedImages.length - 1;
                                        bgDiv.style.backgroundImage =
                                            `url('${loadedImages[currentBgIndex]}')`;
                                    }
                                    if (loadTimer) clearInterval(loadTimer);
                                    loadTimer = setInterval(() => {
                                        loadNextImage();
                                    }, LOAD_INTERVAL_MS);
                                })
                                .catch(() => {});
                            break;
                        }
                    }
                });

            // Periodic retry for any images that failed temporarily (also random)
            retryTimer = setInterval(() => {
                const next = getRandomUnloadedIndex();
                if (next !== -1) {
                    console.log(`🔄 Retrying unloaded image ${next}`);
                    loadSingleImage(next).catch(() => {});
                }
            }, RETRY_DELAY_MS);
        }

        // Background rotation: picks a random loaded image every interval
        function startBackgroundRotation(intervalTime) {
            if (bgRotationInterval) clearInterval(bgRotationInterval);
            bgRotationInterval = setInterval(() => {
                if (loadedImages.length === 0) return;
                let newIndex;
                if (loadedImages.length === 1) {
                    newIndex = 0;
                } else {
                    do {
                        newIndex = Math.floor(Math.random() * loadedImages.length);
                    } while (newIndex === currentBgIndex);
                }
                currentBgIndex = newIndex;
                bgDiv.style.backgroundImage = `url('${loadedImages[currentBgIndex]}')`;
            }, intervalTime);
        }

        // Start everything
        startStaggeredLoading();
        startBackgroundRotation(5000); // normal speed

        // ---------- Ticker Message Cycle ----------
        let tickerMessages = [
            "✦ Os's Furry Server ✦",
            "Map: loading...",
            "Gamemode: sandbox + ttt/mafia"
        ];
        let currentMessageIndex = 0;
        const tickerElement = document.getElementById('tickerMessage');

        function rotateTickerMessage() {
            if (!tickerElement) return;
            tickerElement.style.opacity = '0';
            setTimeout(() => {
                currentMessageIndex = (currentMessageIndex + 1) % tickerMessages.length;
                tickerElement.textContent = tickerMessages[currentMessageIndex];
                tickerElement.style.opacity = '1';
            }, 300);
        }
        setInterval(rotateTickerMessage, 7000);

        // ---------- Random Phrase & Story ----------
        const verbs = ["lifting", "carrying", "throwing", "eating", "petting", "running over", "dancing with",
            "photographing", "feeding", "tickling", "worshipping", "fighting", "marrying", "betraying", "hating",
            "loving", "respecting", "being rocked by", "comparing", "supernova-ing", "a long sentence is being eaten by",
            "mating", "kissing", "licking", "liking", "doing", "done", "undoing", "reversing", "removing", "making",
            "realisticly making", "teaching", "Carl Wheezer loves", "Jimmy Neutron loves", "crapping", "romantizing", "sillying", "downloading", "lolipopping", "deering", "mommying", "daddying", "adding", "importing", "excorsizing", "exersizing", "exporting", "mooning", "bouncing", "referbrisihing",
            "Local scientist is actually just"
        ];
        const nouns = ["your mom", "carl weezer", "a fursuit", "G-Man", "the combine", "a toilet", "Gordon Freeman",
            "a lambda logo", "the gravity gun", "a headcrab", "a barnacle", "the admin", "a prop", "the void",
            "your sanity", "a sock", "a crowbar", "you", "osbornd", "the entirety of science", "the world", "furries",
            "the femboys", "the trannies", "the straights", "the gays", "jimmies mom", "jimmy neutron",
            "steve from minecraft", "alex from minecraft", "fortnite", "minecraft", "Call Of Duty",
            "six siege but gay version", "Among Us", "LLMs", "Deepseek v3.2", "ChatGPT 5.2", "ChatGPT 4o", "ChatGPT",
            "Claude Sonnet", "Waluigi", "Mario", "Wario", "the bed", "a seat", "walmart", "walmart bag", "sand", "a helper", "a member", "a user", "battlebit", "battlebyte", "caseoh", "Dream", "GeorgeNotFound", "Muye", "scrapman", "kan", "Garry Newman", "Gmod", "Ms. Kleiner", "nikado avacado", "youtube", "roblox", "Muck", "Twitch", "twitter", "x". "Donald Trump", "Joe Biden", "Obama", "your laptop"
        ];

        function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        const storyDiv = document.getElementById('story');
        const phraseDiv = document.getElementById('phrase');
        const maxStoryLines = 15;
        let storyLines = [];

        function addStoryLine(line) {
            storyLines.push(line);
            if (storyLines.length > maxStoryLines) storyLines.shift();
            storyDiv.innerHTML = storyLines.map(text => `<div>${text}</div>`).join('');
            storyDiv.scrollTop = storyDiv.scrollHeight;
        }

        function updatePhrase() {
            const phrase = `${randomItem(verbs)} ${randomItem(nouns)}...`;
            phraseDiv.innerText = phrase;
            addStoryLine(phrase);
        }
        updatePhrase();
        setInterval(updatePhrase, 1500);

        // ---------- Auto Tic‑Tac‑Toe (canvas 200×200, 40% transparent) ----------
        const canvas = document.getElementById('tictactoe');
        const ctx = canvas.getContext('2d');
        const CANVAS_SIZE = 200; // 20% smaller: was 250
        const cellSize = CANVAS_SIZE / 3;
        let board = [
            ['', '', ''],
            ['', '', ''],
            ['', '', '']
        ];
        let currentPlayer = 'X',
            gameOver = false,
            winningCombo = null;

        function drawBoard() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            ctx.strokeStyle = 'rgba(51, 51, 51, 0.60)';
            ctx.lineWidth = 3;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(CANVAS_SIZE, i * cellSize);
                ctx.stroke();
            }
            ctx.font = 'bold 40px "Courier New", monospace'; // scaled down from 50px
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let r = 0; r < 3; r++)
                for (let c = 0; c < 3; c++) {
                    if (board[r][c] === '') continue;
                    let x = c * cellSize + cellSize / 2,
                        y = r * cellSize + cellSize / 2;
                    ctx.fillStyle = board[r][c] === 'X' ? '#ff5555' : '#55aaff';
                    ctx.fillText(board[r][c], x, y);
                }
            if (winningCombo) {
                ctx.fillStyle = 'rgba(0,255,0,0.3)';
                winningCombo.forEach(([r, c]) => ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize));
            }
        }

        function checkWin() {
            const lines = [
                [
                    [0, 0],
                    [0, 1],
                    [0, 2]
                ],
                [
                    [1, 0],
                    [1, 1],
                    [1, 2]
                ],
                [
                    [2, 0],
                    [2, 1],
                    [2, 2]
                ],
                [
                    [0, 0],
                    [1, 0],
                    [2, 0]
                ],
                [
                    [0, 1],
                    [1, 1],
                    [2, 1]
                ],
                [
                    [0, 2],
                    [1, 2],
                    [2, 2]
                ],
                [
                    [0, 0],
                    [1, 1],
                    [2, 2]
                ],
                [
                    [0, 2],
                    [1, 1],
                    [2, 0]
                ]
            ];
            for (let line of lines) {
                const [a, b, c] = line;
                if (board[a[0]][a[1]] && board[a[0]][a[1]] === board[b[0]][b[1]] && board[a[0]][a[1]] === board[c[0]][
                        c[1]
                    ])
                    return line;
            }
            return null;
        }

        function isDraw() { return board.every(row => row.every(cell => cell !== '')); }

        function resetBoard() {
            board = [
                ['', '', ''],
                ['', '', ''],
                ['', '', '']
            ];
            currentPlayer = 'X';
            gameOver = false;
            winningCombo = null;
            drawBoard();
        }

        function randomMove() {
            if (gameOver) return;
            let empty = [];
            for (let r = 0; r < 3; r++)
                for (let c = 0; c < 3; c++)
                    if (board[r][c] === '') empty.push([r, c]);
            if (empty.length === 0) { gameOver = true;
                setTimeout(resetBoard, 400); return; }
            let [r, c] = empty[Math.floor(Math.random() * empty.length)];
            board[r][c] = currentPlayer;
            let win = checkWin();
            if (win) { winningCombo = win;
                gameOver = true;
                drawBoard();
                setTimeout(resetBoard, 400); return; }
            if (isDraw()) { gameOver = true;
                drawBoard();
                setTimeout(resetBoard, 400); return; }
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            drawBoard();
        }
        setInterval(randomMove, 250);
        drawBoard();

        // ---------- Audio Autoplay ----------
        window.addEventListener('load', function() {
            const audio = document.getElementById('bgm');
            audio.play().catch(e => console.log('Autoplay failed'));
        });

        // ---------- 2‑Minute Timer & Info Mode ----------
        const mainPanel = document.getElementById('mainPanel');
        const infoOverlay = document.getElementById('infoOverlay');
        const infoContent = document.getElementById('infoContent');

        const infoMessages = [
            `Welcome to Os's Furry Server! Hope you've enjoyed the loading screens thus far.\n\nRule of thumb, these are not all of the rules, but here's some:\nIf someone says no and they mean it, stop what you are doing. Angering people for fun, especially, is not tolerated. Niceness and consent matter for everyone's fun. Unless you're a minge and you're gonna ignore this anyway, lol.\n\nI recommend staying low as you are (likely) new. I recommend chatting, or simply driving around when bored. You'll be surprised what conversations you can have!`,
            `This server's general intended community:\nChill.\nKindness is most important.\nReports are to be made for any complaints of anyone, including staff.\n We are open to criticism.`,
            `This server is run by Osbornd29, hence "Os's".\nMost things on here are made with LLMs/AI. Osbornd29 simply made the layouts, optimizations used, and the idea of them. LLMs used for the actual syntax part of coding, just to be clear.\nThis server beta-testing alone spans 10+ months; expect some level of quality.`
        ];

        let infoIndex = 0;
        let infoInterval;

        function showInfoMode() {
            // Slow down background rotation to 20 seconds during info mode
            startBackgroundRotation(20000);

            // Hide main panel, show info overlay
            mainPanel.style.opacity = '0';
            setTimeout(() => {
                mainPanel.style.display = 'none';
            }, 500);
            infoOverlay.classList.add('active');

            // Start cycling info messages
            infoContent.innerText = infoMessages[0];
            if (infoInterval) clearInterval(infoInterval);
            infoInterval = setInterval(() => {
                infoIndex = (infoIndex + 1) % infoMessages.length;
                infoContent.innerText = infoMessages[infoIndex];
            }, 25000);
        }

        // Start 1.5 minute timer
        let inactivityTimer = setTimeout(showInfoMode, 90000);

        // GameDetails override (called when player joins a server)
        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, lang,
            gamemodeNice) {
            clearTimeout(inactivityTimer);
            if (infoInterval) clearInterval(infoInterval);
            // Restore main panel
            mainPanel.style.display = 'block';
            mainPanel.style.opacity = '1';
            infoOverlay.classList.remove('active');
            // Restore normal background rotation speed
            startBackgroundRotation(5000);

            function formatMapName(rawMap) {
                let withoutPrefix = rawMap.includes('_') ? rawMap.substring(rawMap.indexOf('_') + 1) : rawMap;
                let withSpaces = withoutPrefix.replace(/_/g, ' ');
                let parts = withSpaces.split(/(\d+)/);
                let filtered = parts.filter(part => !/^\d+$/.test(part));
                let result = filtered.join(' ').replace(/\s+/g, ' ').trim();
                result = result.replace(/\b[a-zA-Z]\b\s*/g, '').trim();
                return result || "unknown map";
            }

            let formattedMap = formatMapName(mapname);
            tickerMessages[1] = `Map: ${formattedMap}`;
            if (currentMessageIndex === 1) {
                tickerElement.textContent = tickerMessages[1];
            }
        };
    </script>
</body>
